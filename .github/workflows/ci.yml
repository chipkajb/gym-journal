name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & type-check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run type-check

      - name: Check formatting
        run: npm run format:check

  # ─────────────────────────────────────────────
  # 2. Unit & component tests (Jest)
  # ─────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --passWithNoTests --forceExit
        working-directory: apps/web
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          NEXTAUTH_SECRET: "ci-test-secret"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: apps/web/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 3. Build check
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (no DB needed)
        run: npm run db:generate

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/gymjournal"
          NEXTAUTH_SECRET: "ci-build-secret-32chars-minimum!!"
          NEXTAUTH_URL: "http://localhost:3000"
          NODE_ENV: "production"
          SKIP_ENV_VALIDATION: "1"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: apps/web/.next/
          retention-days: 1

  # ─────────────────────────────────────────────
  # 4. E2E tests (Playwright) — runs against a
  #    real Postgres instance in CI
  # ─────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    # Only run E2E on PRs to main or manual triggers (expensive)
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gymjournal
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: gymjournal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: "postgresql://gymjournal:changeme@localhost:5432/gymjournal"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium
        working-directory: apps/web
        env:
          DATABASE_URL: "postgresql://gymjournal:changeme@localhost:5432/gymjournal"
          NEXTAUTH_SECRET: "ci-e2e-secret-32chars-minimum!!!"
          NEXTAUTH_URL: "http://localhost:3000"
          NODE_ENV: "test"
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 5. Docker build (on push to main only)
  # ─────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: gym-journal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/gymjournal
            NEXTAUTH_SECRET=docker-build-secret
            NEXTAUTH_URL=http://localhost:3000
