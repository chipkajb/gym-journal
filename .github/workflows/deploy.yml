name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        type: choice
        options: [production, staging]
        default: production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        # Configure REGISTRY, REGISTRY_USERNAME, REGISTRY_PASSWORD secrets
        # in the GitHub environment for your registry (GHCR, Docker Hub, etc.)
        if: vars.REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ vars.REGISTRY != '' && 'true' || 'false' }}
          tags: |
            ${{ vars.REGISTRY && format('{0}/gym-journal:{1}', vars.REGISTRY, github.sha) || 'gym-journal:latest' }}
            ${{ vars.REGISTRY && format('{0}/gym-journal:latest', vars.REGISTRY) || 'gym-journal:latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to home server via SSH
        # Configure SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY secrets
        # in GitHub → Settings → Secrets and variables → Actions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/gym-journal
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
            docker image prune -f
